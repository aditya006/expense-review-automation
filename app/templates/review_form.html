<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Review</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 1rem;
        background: #f6f7fb;
      }
      .card {
        max-width: 680px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .meta {
        color: #555;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-top: 0.8rem;
        font-weight: 600;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        margin-top: 0.3rem;
        padding: 0.6rem;
        border-radius: 8px;
        border: 1px solid #d4d8e3;
        font-size: 1rem;
      }
      .actions {
        display: grid;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .status {
        margin-top: 0.8rem;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Review Expense</h1>
      <p class="meta">
        Amount: Rs {{ "%.2f"|format((transaction.amount_minor or 0) / 100) }}<br />
        Merchant: {{ transaction.merchant or "Unknown" }}<br />
        Status: {{ transaction.status }}
      </p>

      <label>Amount (INR)</label>
      <input id="amount" type="number" value="{{ "%.2f"|format((transaction.amount_minor or 0) / 100) }}" step="0.01" />

      <label>Description</label>
      <input id="description" type="text" value="{{ transaction.merchant or '' }}" />

      <label>Group</label>
      <select id="group_id">
        <option value="">Select a group</option>
        {% for group in groups %}
        <option value="{{ group.group_id }}">{{ group.group_name }}</option>
        {% endfor %}
      </select>

      <label>Participants (comma-separated IDs)</label>
      <input id="participants" type="text" placeholder="u1,u2,u3" />

      <label>Split Mode</label>
      <select id="split_mode">
        <option value="equal">Equal</option>
        <option value="custom">Custom</option>
      </select>

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <div class="actions">
        <button onclick="submitAction('post')">Post to Splitwise</button>
        <button onclick="submitAction('draft')">Save Draft</button>
        <button onclick="submitAction('manually_done')">Mark Manually Done</button>
        <button onclick="submitAction('ignore')">Ignore</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script>
      async function submitAction(action) {
        const participantsRaw = document.getElementById('participants').value.trim();
        const participant_ids = participantsRaw
          ? participantsRaw.split(',').map((x) => x.trim()).filter(Boolean)
          : [];

        const payload = {
          group_id: document.getElementById('group_id').value || null,
          participant_ids,
          split_mode: document.getElementById('split_mode').value,
          description: document.getElementById('description').value || null,
          notes: document.getElementById('notes').value || null,
          action,
        };

        const url = `${window.location.pathname}?t={{ review_token }}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        document.getElementById('status').innerText = data.detail || JSON.stringify(data);
      }
    </script>
  </body>
</html>
